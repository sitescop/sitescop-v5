# Production stack — SiteScop V5
# Usage: copy .env.production.example → .env.production, then npm run go-live

services:
  postgres:
    image: postgres:16-alpine
    container_name: sitescop-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sitescop_v5
    volumes:
      - sitescop_prod_pg:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d sitescop_v5']
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sitescop-prod-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/sitescop_v5
      SESSION_SECRET: ${SESSION_SECRET}
      WEB_APP_URL: ${WEB_APP_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    volumes:
      - sitescop_prod_reports:/app/apps/api/storage/reports
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ''
    container_name: sitescop-prod-web
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: sitescop-prod-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - sitescop_prod_caddy_data:/data
      - sitescop_prod_caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  sitescop_prod_pg:
  sitescop_prod_reports:
  sitescop_prod_caddy_data:
  sitescop_prod_caddy_config:
